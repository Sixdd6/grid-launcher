# io.github.Sixdd6.RomMateNeo.yml  (or .json if preferred)
app-id: io.github.Sixdd6.RomMateNeo
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: "6.10"
command: rom-mate-neo

finish-args:
  # Wayland + X11 fallback
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GPU rendering (needed by Qt6/OpenGL cover art)
  - --device=dri
  # Network for RomM server communication
  - --share=network
  # Home directory access for emulator configs and ROM library
  # (see Section 2.5 for portal strategy)
  - --filesystem=home
  # Controller input via /dev/input (hidraw for joysticks)
  - --device=all
  # Secret storage (GNOME Keyring / KWallet via libsecret portal)
  - --talk-name=org.freedesktop.secrets

modules:
  - name: python-dependencies
    # generated by flatpak-pip-generator
    buildsystem: simple
    build-commands: []
    # ... (flatpak-pip-generator output inlined here)

  - name: rom-mate-neo
    buildsystem: simple
    build-commands:
      - install -Dm755 rom-mate.py /app/bin/rom-mate-neo-launcher.py
      - cp -r rom_mate /app/lib/rom_mate
      - cp retroarch-core-list.json /app/share/rom-mate-neo/
      - cp emulator-autoprofiles.json /app/share/rom-mate-neo/
      - cp -r assets /app/share/rom-mate-neo/assets
      - install -Dm755 flatpak/rom-mate-neo.sh /app/bin/rom-mate-neo
      - install -Dm644 flatpak/io.github.Sixdd6.RomMateNeo.desktop /app/share/applications/
      - install -Dm644 assets/svg/icon.svg /app/share/icons/hicolor/scalable/apps/io.github.Sixdd6.RomMateNeo.svg
    sources:
      - type: git
        url: https://github.com/Sixdd6/rom-mate-neo
        tag: v1.x.x