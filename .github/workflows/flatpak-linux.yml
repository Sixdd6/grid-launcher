name: Build Linux (Flatpak)

on:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      # KDE runtime version in this tag must stay in sync with the
      # `runtime-version` pinned in flatpak/io.github.Sixdd6.GRIDLauncher.yml (currently "6.10").
      image: bilelmoussaoui/flatpak-github-actions:kde-6.10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: grid-launcher.flatpak
          manifest-path: flatpak/io.github.Sixdd6.GRIDLauncher.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grid-launcher-linux-flatpak
          path: grid-launcher.flatpak
          if-no-files-found: error

      - name: Attach Flatpak to release
        uses: softprops/action-gh-release@v2
        with:
          files: grid-launcher.flatpak
