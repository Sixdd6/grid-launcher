name: Build Linux (Flatpak)

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub/flatpak-builder-base:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak runtimes
        run: |
          flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub \
            org.kde.Platform//6.10 \
            org.kde.Sdk//6.10 \
            io.qt.PySide.BaseApp//6.10

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: rom-mate-neo.flatpak
          manifest-path: flatpak/io.github.Sixdd6.RomMateNeo.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-mate-neo-linux-flatpak
          path: rom-mate-neo.flatpak
          if-no-files-found: error

      - name: Attach Flatpak to release
        uses: softprops/action-gh-release@v2
        with:
          files: rom-mate-neo.flatpak