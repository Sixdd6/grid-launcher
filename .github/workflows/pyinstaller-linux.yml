name: Build Linux

on:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build:
    name: Build with PyInstaller
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile --name grid-launcher --add-data "assets:assets" --add-data "retroarch-core-list.json:." --add-data "emulator-autoprofiles.json:." --hidden-import brotli --hidden-import pyzstd --hidden-import pyppmd --hidden-import keyring.backends.SecretService --hidden-import keyring.backends.kwallet grid-launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grid-launcher-linux
          path: dist/grid-launcher
          if-no-files-found: error

      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/grid-launcher
